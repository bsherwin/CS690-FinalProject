name: .NET Release

on:
  push:
    branches:
      - main  # Change to your release branch

permissions:
  contents: write  # Required to create releases

jobs:
  build-test-release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0' # Change to your target version

      # 3. Restore dependencies
      - name: Restore dependencies
        working-directory: jotit
        run: dotnet restore

      # 4. Build project
      - name: Build
        working-directory: jotit
        run: dotnet build --configuration Release --no-restore

      # 5. Run tests
      # - name: Test
      #   run: dotnet test --no-build --verbosity normal

      # 6. Publish application
      - name: Publish (win-x64)
        working-directory: jotit
        run: dotnet publish -c Release -r win-x64 -o ./publish/win-x64
      - name: Zip (win-x64)
        run: zip -r jotit/publish/win-x64.zip jotit/publish/win-x64/

      - name: Publish (linux-x64)
        working-directory: jotit
        run: dotnet publish -c Release -r linux-x64 -o ./publish/linux-x64
      - name: Zip (linux-x64)
        run: zip -r jotit/publish/linux-x64.zip jotit/publish/linux-x64/
      
      - name: Publish (osx-x64)
        working-directory: jotit
        run: dotnet publish -c Release -r osx-x64 -o ./publish/osx-x64
      - name: Zip (osx-x64)
        run: zip -r jotit/publish/osx-x64.zip jotit/publish/osx-x64/

      # 7. Create GitHub Release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated release from GitHub Actions.
            Build number: ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. Upload published files to release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: |
            jotit/publish/win-x64.zip
            jotit/publish/linux-x64.zip
            jotit/publish/osx-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
